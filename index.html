<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Area Riservata — Studio De Paola</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
body { font-family: Arial; padding:20px; }
.hidden { display:none; }
button { cursor:pointer; }
</style>
</head>
<body>

<h2>Login</h2>
<input id="login-email" placeholder="email"><br><br>
<input id="login-password" type="password" placeholder="password"><br><br>
<button onclick="doLogin()">Accedi</button>

<hr>

<div id="app" class="hidden">

<h2>Dashboard</h2>
<div id="dash-fatture-body"></div>

<hr>

<h2>Fatture</h2>
<div id="fatture-body"></div>

</div>

<script>
// CONFIG
const SUPABASE_URL = 'https://znjhrwrwgpzmfwewdbnm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_TMbin3rxRij58V_Wquk5_Q_z375MFUz';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// STATE
let currentUser = null;
let fattureData = [];

// LOGIN
async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pwd = document.getElementById('login-password').value;

  const { data, error } = await sb.auth.signInWithPassword({
    email,
    password: pwd
  });

  if (error) {
    alert("Errore login");
    return;
  }

  currentUser = data.user;
  document.getElementById('app').classList.remove('hidden');

  await loadFatture();
  renderDashboard();
  renderFatture();
}

// LOAD
async function loadFatture() {
  const { data } = await sb.from('fatture').select('*');
  fattureData = data || [];
}

// DASHBOARD (FIXATO)
function renderDashboard() {

  const daIncassare = fattureData.filter(f => f.tipo === 'emessa' && !f.pagata);
  const list5 = daIncassare.slice(0, 6);

  const fb = document.getElementById('dash-fatture-body');

  if (daIncassare.length === 0) {
    fb.innerHTML = `<p>Tutte incassate</p>`;
    return;
  }

  fb.innerHTML = `
    <table border="1" cellpadding="8">
      <tr>
        <th>Cliente</th>
        <th>Data</th>
        <th>Importo</th>
        <th></th>
      </tr>
      ${list5.map(f => `
        <tr>
          <td>${f.cessionario_nome || f.cedente_nome || '—'}</td>
          <td>${fmtDate(f.data_emissione)}</td>
          <td>${fmt(f.importo)}</td>
          <td>
            <button onclick="togglePagata('${f.id}', ${f.pagata})">
              Incassa
            </button>
          </td>
        </tr>
      `).join('')}
    </table>
  `;
}

// FATTURE (FIXATO)
function renderFatture() {

  const el = document.getElementById('fatture-body');

  if (fattureData.length === 0) {
    el.innerHTML = `<p>Nessuna fattura</p>`;
    return;
  }

  el.innerHTML = `
    <table border="1" cellpadding="8">
      <tr>
        <th>Numero</th>
        <th>Data</th>
        <th>Tipo</th>
        <th>Importo</th>
        <th>Stato</th>
      </tr>

      ${fattureData.map(f => `
        <tr>
          <td>${f.numero || '-'}</td>
          <td>${fmtDate(f.data_emissione)}</td>
          <td>${f.tipo}</td>
          <td>${fmt(f.importo)}</td>
          <td>
            <button onclick="togglePagata('${f.id}', ${f.pagata})">
              ${f.pagata ? 'Pagata' : 'Da incassare'}
            </button>
          </td>
        </tr>
      `).join('')}

    </table>
  `;
}

// TOGGLE
async function togglePagata(id, currentVal) {

  const nuovo = !currentVal;

  const { error } = await sb
    .from('fatture')
    .update({ pagata: nuovo })
    .eq('id', id);

  if (error) {
    alert("Errore update");
    return;
  }

  const idx = fattureData.findIndex(f => f.id === id);
  if (idx !== -1) fattureData[idx].pagata = nuovo;

  renderDashboard();
  renderFatture();
}

// HELPERS
function fmt(n) {
  if (!n) return '€ 0';
  return '€ ' + Number(n).toLocaleString('it-IT', {
    minimumFractionDigits: 2
  });
}

function fmtDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('it-IT');
}

</script>

</body>
</html>
